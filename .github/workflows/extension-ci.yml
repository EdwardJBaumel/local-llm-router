name: Extension CI

on:
  push:
    paths:
      - "extension/vscode/**"
      - ".github/workflows/extension-ci.yml"
  pull_request:
    paths:
      - "extension/vscode/**"
      - ".github/workflows/extension-ci.yml"

jobs:
  compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension/vscode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Compile TypeScript
        run: npm run compile
